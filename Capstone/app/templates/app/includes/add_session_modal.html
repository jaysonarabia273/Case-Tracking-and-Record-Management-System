<!-- Add Session to Case Modal -->
<div id="addSessionModal" class="modal" style="display: none;">
    <div class="modal-overlay" onclick="closeAddSessionModal()"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h2 class="modal-title">
                <i class="fas fa-calendar-plus"></i>
                Add New Session
            </h2>
            <button class="modal-close" onclick="closeAddSessionModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form id="addSessionForm" method="POST" action="">
            {% csrf_token %}
            <input type="hidden" name="case_id" id="sessionCaseId" value="">
            
            <div class="modal-body">
                <!-- Session Type -->
                <div class="form-group">
                    <label for="sessionType" class="form-label">
                        <i class="fas fa-tag"></i>
                        Session Type
                    </label>
                    <select name="session_type" id="sessionType" class="form-control" required onchange="toggleCaseLink()">
                        <option value="standalone">Standalone Session</option>
                        <option value="linked">Link to Existing Case</option>
                    </select>
                </div>

                <!-- Linked Case Selection (hidden by default) -->
                <div class="form-group" id="linkedCaseGroup" style="display: none;">
                    <label for="linkedCase" class="form-label">
                        <i class="fas fa-link"></i>
                        Select Case
                    </label>
                    <select name="linked_case" id="linkedCase" class="form-control">
                        <option value="">-- Select a case --</option>
                        <!-- Will be populated dynamically -->
                    </select>
                </div>

                <!-- Session Title -->
                <div class="form-group">
                    <label for="sessionTitle" class="form-label">
                        <i class="fas fa-heading"></i>
                        Session Title
                    </label>
                    <input type="text" name="title" id="sessionTitle" class="form-control" 
                           placeholder="e.g., Academic Performance Discussion" required>
                </div>

                <!-- Reason -->
                <div class="form-group">
                    <label for="sessionReason" class="form-label">
                        <i class="fas fa-question-circle"></i>
                        Reason for Session
                    </label>
                    <select name="reason" id="sessionReason" class="form-control" required>
                        <option value="">-- Select reason --</option>
                        <option value="academic">Academic Concerns</option>
                        <option value="personal">Personal Issues</option>
                        <option value="career">Career Planning</option>
                        <option value="mental_health">Mental Health Support</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Primary Student -->
                <div class="form-group">
                    <label for="primaryStudent" class="form-label">
                        <i class="fas fa-user"></i>
                        Primary Student
                    </label>
                    <select name="student" id="primaryStudent" class="form-control" required>
                        <option value="">-- Select student --</option>
                        <!-- Will be populated dynamically -->
                    </select>
                </div>

                <!-- Additional Participants -->
                <div class="form-group">
                    <label for="participants" class="form-label">
                        <i class="fas fa-users"></i>
                        Additional Participants (Optional)
                        <span class="form-hint">Hold Ctrl/Cmd to select multiple</span>
                    </label>
                    <select name="participants" id="participants" class="form-control" multiple size="4">
                        <!-- Will be populated dynamically -->
                    </select>
                    <small class="form-help">
                        Select parents, guardians, or other students to include in this session
                    </small>
                </div>

                <!-- Schedule Date & Time -->
                <div class="form-row">
                    <div class="form-group form-col-6">
                        <label for="sessionDate" class="form-label">
                            <i class="fas fa-calendar"></i>
                            Schedule Date
                        </label>
                        <input type="date" name="scheduled_date" id="sessionDate" class="form-control" 
                               min="{{ today }}" required>
                    </div>
                    <div class="form-group form-col-6">
                        <label for="sessionTime" class="form-label">
                            <i class="fas fa-clock"></i>
                            Schedule Time
                        </label>
                        <input type="time" name="scheduled_time" id="sessionTime" class="form-control" required>
                    </div>
                </div>

                <!-- Location -->
                <div class="form-group">
                    <label for="sessionLocation" class="form-label">
                        <i class="fas fa-map-marker-alt"></i>
                        Location
                    </label>
                    <input type="text" name="location" id="sessionLocation" class="form-control" 
                           placeholder="e.g., Guidance Office, Room 205">
                </div>

                <!-- Counselor Assignment -->
                <div class="form-group">
                    <label for="assignedCounselor" class="form-label">
                        <i class="fas fa-user-tie"></i>
                        Assigned Counselor
                    </label>
                    <select name="assigned_counselor" id="assignedCounselor" class="form-control">
                        <option value="">-- Assign later --</option>
                        <!-- Will be populated dynamically -->
                    </select>
                </div>

                <!-- Description/Notes -->
                <div class="form-group">
                    <label for="sessionDescription" class="form-label">
                        <i class="fas fa-align-left"></i>
                        Description/Notes
                    </label>
                    <textarea name="description" id="sessionDescription" class="form-control" 
                              rows="4" placeholder="Additional details about this session..."></textarea>
                </div>

                <!-- Session Mode -->
                <div class="form-group">
                    <label for="sessionMode" class="form-label">
                        <i class="fas fa-video"></i>
                        Session Mode
                    </label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="mode" value="in_person" checked>
                            <span>In-Person</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="mode" value="online">
                            <span>Online/Virtual</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="mode" value="hybrid">
                            <span>Hybrid</span>
                        </label>
                    </div>
                </div>

                <!-- Auto-approve option -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="auto_approve" id="autoApprove" checked>
                        <span>Automatically approve this session</span>
                    </label>
                </div>

                <!-- Send notifications -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="send_notifications" id="sendNotifications" checked>
                        <span>Send notifications to all participants</span>
                    </label>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeAddSessionModal()">
                    <i class="fas fa-times"></i>
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Create Session
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// Modal Control Functions
function openAddSessionModal(caseId = null) {
    const modal = document.getElementById('addSessionModal');
    const form = document.getElementById('addSessionForm');
    
    if (caseId) {
        document.getElementById('sessionCaseId').value = caseId;
        document.getElementById('sessionType').value = 'linked';
        document.getElementById('linkedCaseGroup').style.display = 'block';
        form.action = '/counselor/session/create/';
    } else {
        form.action = '/counselor/session/create/';
    }
    
    // Load data
    loadStudents();
    loadParticipants();
    loadCounselors();
    if (caseId) {
        loadCases();
    }
    
    // Set today's date as minimum
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('sessionDate').min = today;
    
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeAddSessionModal() {
    const modal = document.getElementById('addSessionModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    document.getElementById('addSessionForm').reset();
}

function toggleCaseLink() {
    const sessionType = document.getElementById('sessionType').value;
    const linkedCaseGroup = document.getElementById('linkedCaseGroup');
    
    if (sessionType === 'linked') {
        linkedCaseGroup.style.display = 'block';
        loadCases();
    } else {
        linkedCaseGroup.style.display = 'none';
    }
}

// Load students for selection
async function loadStudents() {
    try {
        const response = await fetch('/api/students/');
        const students = await response.json();
        
        const select = document.getElementById('primaryStudent');
        select.innerHTML = '<option value="">-- Select student --</option>';
        
        students.forEach(student => {
            const option = document.createElement('option');
            option.value = student.id;
            option.textContent = `${student.name} (${student.student_number})`;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading students:', error);
    }
}

// Load participants (students, parents, etc.)
async function loadParticipants() {
    try {
        const response = await fetch('/api/profiles/');
        const profiles = await response.json();
        
        const select = document.getElementById('participants');
        select.innerHTML = '';
        
        profiles.forEach(profile => {
            const option = document.createElement('option');
            option.value = profile.id;
            option.textContent = `${profile.name} (${profile.type})`;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading participants:', error);
    }
}

// Load counselors
async function loadCounselors() {
    try {
        const response = await fetch('/api/counselors/');
        const counselors = await response.json();
        
        const select = document.getElementById('assignedCounselor');
        select.innerHTML = '<option value="">-- Assign later --</option>';
        
        counselors.forEach(counselor => {
            const option = document.createElement('option');
            option.value = counselor.id;
            option.textContent = counselor.name;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading counselors:', error);
    }
}

// Load active cases
async function loadCases() {
    try {
        const response = await fetch('/api/cases/active/');
        const cases = await response.json();
        
        const select = document.getElementById('linkedCase');
        select.innerHTML = '<option value="">-- Select a case --</option>';
        
        cases.forEach(caseItem => {
            const option = document.createElement('option');
            option.value = caseItem.id;
            option.textContent = `${caseItem.title} - ${caseItem.student_name}`;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('Error loading cases:', error);
    }
}

// Handle form submission
document.getElementById('addSessionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const submitBtn = this.querySelector('button[type="submit"]');
    
    // Disable button
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
    
    try {
        const response = await fetch(this.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        
        const result = await response.json();
        
        if (result.success) {
            // Show success message
            if (window.ToastManager) {
                ToastManager.success('Session Created', result.message || 'Session created successfully');
            }
            
            // Close modal
            closeAddSessionModal();
            
            // Reload page or update UI
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        } else {
            // Show error
            if (window.ToastManager) {
                ToastManager.error('Error', result.message || 'Failed to create session');
            }
            alert(result.message || 'Failed to create session');
        }
    } catch (error) {
        console.error('Error:', error);
        if (window.ToastManager) {
            ToastManager.error('Error', 'An error occurred while creating the session');
        }
        alert('An error occurred while creating the session');
    } finally {
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-plus"></i> Create Session';
    }
});

// Close modal on ESC key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeAddSessionModal();
    }
});
</script>

<style>

    width: 100%;

}

.modal-body {
    padding: var(--spacing-lg);

    flex: 1;
}

.modal-footer {
    padding: var(--spacing-lg);
    border-top: 1px solid var(--border-color);
    display: flex;
    gap: var(--spacing-sm);
    justify-content: flex-end;
}

    margin-bottom: var(--spacing-md);
}

.form-label {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-xs);
    font-weight: 500;
    color: var(--text-primary);
}

.form-label i {
    color: var(--primary-green);
    font-size: 0.875rem;
}

.form-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: normal;
    margin-left: var(--spacing-xs);
}

.form-control {

}

}

.form-row {

}

}

}

.radio-label {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    cursor: pointer;
}

.radio-label input[type="radio"] {

}

    align-items: center;
    gap: var(--spacing-sm);

    font-weight: normal;
}

.checkbox-label input[type="checkbox"] {

}

/* Mobile Responsive */
